<h2 class="page-title">Job Applications</h2>
<mat-card class="panel">
  <form [formGroup]="form" (ngSubmit)="save()" class="grid-form">
    <mat-form-field appearance="outline"><mat-label>Title</mat-label><input matInput formControlName="jobTitle" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Company</mat-label><input matInput formControlName="companyName" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Client</mat-label><input matInput formControlName="clientName" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Source</mat-label><input matInput formControlName="source" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>URL</mat-label><input matInput formControlName="jobUrl" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Applied</mat-label><input matInput type="date" formControlName="appliedDate" /></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Status</mat-label><input matInput formControlName="status" /></mat-form-field>
    <mat-form-field appearance="outline" class="wide"><mat-label>Notes</mat-label><input matInput formControlName="notes" /></mat-form-field>
    <button mat-flat-button color="primary" type="submit">Add</button>
  </form>
</mat-card>
<mat-card class="panel">
  <table mat-table [dataSource]="rows" class="full-table">
    <ng-container matColumnDef="title"><th mat-header-cell *matHeaderCellDef>Title</th><td mat-cell *matCellDef="let r">{{ r['jobTitle'] }}</td></ng-container>
    <ng-container matColumnDef="company"><th mat-header-cell *matHeaderCellDef>Company</th><td mat-cell *matCellDef="let r">{{ r['companyName'] }}</td></ng-container>
    <ng-container matColumnDef="client"><th mat-header-cell *matHeaderCellDef>Client</th><td mat-cell *matCellDef="let r">{{ r['clientName'] }}</td></ng-container>
    <ng-container matColumnDef="source"><th mat-header-cell *matHeaderCellDef>Source</th><td mat-cell *matCellDef="let r">{{ r['source'] }}</td></ng-container>
    <ng-container matColumnDef="applied"><th mat-header-cell *matHeaderCellDef>Applied</th><td mat-cell *matCellDef="let r">{{ r['appliedDate'] | date }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r">{{ r['status'] }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="cols"></tr>
    <tr mat-row *matRowDef="let row; columns: cols"></tr>
  </table>
</mat-card>
