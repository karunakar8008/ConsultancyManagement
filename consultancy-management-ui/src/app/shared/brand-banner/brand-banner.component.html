<header class="brand-banner" role="banner">
  <app-brand-lockup size="md" variant="dark" />
  <div class="client-block">
    <div class="client-logo" aria-hidden="true">
      <app-client-logo-mark [label]="clientDisplayName + ' logo'" />
    </div>
    <div class="client-text">
      <span class="client-label">Organization</span>
      <span class="client-name">{{ clientDisplayName }}</span>
    </div>
  </div>
</header>
