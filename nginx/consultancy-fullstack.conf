# SPA + API on one host (Docker Compose: web -> consultancy-api:8000)
upstream consultancy_api {
    server consultancy-api:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml;

    location /api/ {
        proxy_pass http://consultancy_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://consultancy_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
